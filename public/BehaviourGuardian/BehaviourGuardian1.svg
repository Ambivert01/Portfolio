<svg width="680" height="530" viewBox="0 0 680 530" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Behaviour Guardian architecture</title>
<desc>Page activity flows into a content script that reads only event metadata, into a local risk engine, which either shows a warning banner on the page or updates the background worker, which feeds the popup UI.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#5b6660" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="680" height="530" fill="#f6f6f2"/>

<line x1="340" y1="84" x2="340" y2="124" stroke="#5b6660" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="180" x2="340" y2="220" stroke="#5b6660" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M340 276 L200 316" fill="none" stroke="#5b6660" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M340 276 L480 316" fill="none" stroke="#5b6660" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="480" y1="372" x2="480" y2="412" stroke="#5b6660" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="230" y="40" width="220" height="44" rx="8" fill="#e9e9e3" stroke="#dcdfd9"/>
<text x="340" y="66" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" fill="#1b2420">Page activity</text>
</g>

<g>
<rect x="200" y="124" width="280" height="56" rx="8" fill="#e4f0ed" stroke="#bcd9d1"/>
<text x="340" y="147" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="600" fill="#1b2420">Content script</text>
<text x="340" y="165" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="11.5" fill="#5b6660">Reads event metadata only</text>
</g>

<g>
<rect x="200" y="220" width="280" height="56" rx="8" fill="#e4f0ed" stroke="#bcd9d1"/>
<text x="340" y="243" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="600" fill="#1b2420">Risk engine</text>
<text x="340" y="261" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="11.5" fill="#5b6660">Sliding-window score, on-device</text>
</g>

<g>
<rect x="90" y="316" width="220" height="56" rx="8" fill="#fbf0e2" stroke="#ecd3ae"/>
<text x="200" y="339" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="600" fill="#1b2420">Warning banner</text>
<text x="200" y="357" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="11.5" fill="#5b6660">Only when risk is high</text>
</g>

<g>
<rect x="370" y="316" width="220" height="56" rx="8" fill="#ece7f5" stroke="#cabde8"/>
<text x="480" y="339" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="600" fill="#1b2420">Background worker</text>
<text x="480" y="357" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="11.5" fill="#5b6660">Per-tab score and badge</text>
</g>

<g>
<rect x="370" y="412" width="220" height="56" rx="8" fill="#ece7f5" stroke="#cabde8"/>
<text x="480" y="435" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="600" fill="#1b2420">Popup UI</text>
<text x="480" y="453" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="11.5" fill="#5b6660">On-demand risk view</text>
</g>

<g font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="10.5" fill="#5b6660">
<circle cx="60" cy="500" r="5" fill="#e9e9e3" stroke="#dcdfd9"/>
<text x="72" y="504">raw page events</text>
<circle cx="210" cy="500" r="5" fill="#e4f0ed" stroke="#bcd9d1"/>
<text x="222" y="504">on-device processing</text>
<circle cx="380" cy="500" r="5" fill="#fbf0e2" stroke="#ecd3ae"/>
<text x="392" y="504">shown to the user</text>
<circle cx="530" cy="500" r="5" fill="#ece7f5" stroke="#cabde8"/>
<text x="542" y="504">extension state / UI</text>
</g>
</svg>
